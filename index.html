<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Treasury Live • 5-Min Updates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); }
        .price { font-size: 2.85rem; line-height: 1; font-weight: 700; letter-spacing: -2px; }
        .ratio { font-size: 2.35rem; font-weight: 700; letter-spacing: -1px; }
        .tooltip { position: relative; }
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 180px;
            background-color: #27272a;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 6px 10px;
            position: absolute;
            z-index: 10;
            bottom: 120%;
            left: 50%;
            margin-left: -90px;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .tooltip:hover .tooltiptext { visibility: visible; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto px-6 py-10">

        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-bold tracking-tighter">BTC TREASURY LIVE</h1>
                <p class="text-orange-400 text-xl mt-1">BTC • MSTR • ASST (Strive) • STRC • Smart 8x/day updates</p>
            </div>
            <div class="text-right">
                <div id="timestamp" class="text-zinc-400 text-sm font-medium">Last updated: —</div>
                <button onclick="refreshNow()" 
                        class="mt-4 flex items-center gap-2 bg-orange-400 hover:bg-orange-300 text-black px-7 py-3.5 rounded-2xl font-semibold text-sm transition-all">
                    <i class="fas fa-sync-alt"></i> REFRESH NOW
                </button>
            </div>
        </div>

        <!-- Price Widgets -->
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-12" id="price-grid"></div>

        <!-- Ratio Widgets + New STRC BTC Widget -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6" id="ratio-grid"></div>

        <div class="text-center text-zinc-500 text-xs mt-20">
            Alpha Vantage optimized • MSTR / ASST / STRC update up to 8× during market hours • Volume on hover
        </div>
    </div>

    <script>
        const AV_KEY = "OVCAM1MS1D0KR27Q";

        // Persistent last known data
        let lastData = {
            btcPrice: 84000,
            mstr: { price: 129.76, change: 0, volume: 0 },
            asst: { price: 10.42, change: 0, volume: 0 },
            strc: { price: 100.00, change: 0, volume: 0 }
        };

        let fetchCountToday = 0;
        let lastMarketFetchTime = null;

        function isMarketOpen() {
            const now = new Date();
            const day = now.getDay();
            if (day === 0 || day === 6) return false;

            const utcHour = now.getUTCHours();
            const etHour = (utcHour - 4 + 24) % 24;   // Rough ET (good enough)

            return (etHour > 9 || (etHour === 9 && now.getUTCMinutes() >= 30)) && etHour < 16;
        }

        async function fetchAlphaQuote(symbol) {
            try {
                const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${AV_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                const quote = data['Global Quote'] || {};

                return {
                    price: parseFloat(quote['05. price']) || null,
                    change: parseFloat(quote['10. change percent']) || 0,
                    volume: parseFloat(quote['06. volume']) || 0
                };
            } catch (e) {
                return null;
            }
        }

        async function fetchAllPrices() {
            let btcPrice = lastData.btcPrice;

            // BTC always updates every 5 min
            try {
                const cgRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const cgData = await cgRes.json();
                btcPrice = parseFloat(cgData.bitcoin.usd) || btcPrice;
            } catch (e) {}

            const now = new Date();
            const marketOpen = isMarketOpen();

            let mstr = lastData.mstr;
            let asst = lastData.asst;
            let strc = lastData.strc;

            // Limit to ~8 fetches per day during market hours
            const canFetch = marketOpen && fetchCountToday < 8 && 
                             (!lastMarketFetchTime || (now - lastMarketFetchTime) > 300000); // at least 5 min apart

            if (canFetch) {
                const symbols = ['MSTR', 'ASST', 'STRC'];
                for (const sym of symbols) {
                    const result = await fetchAlphaQuote(sym);
                    if (result && result.price) {
                        if (sym === 'MSTR') mstr = result;
                        else if (sym === 'ASST') asst = result;
                        else if (sym === 'STRC') strc = result;
                    }
                }
                fetchCountToday++;
                lastMarketFetchTime = now;
            }

            // Save latest data
            lastData = { btcPrice, mstr, asst, strc };

            // === Price Cards (Volume in tooltip) ===
            const priceHTML = `
                <div class="card bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
                    <p class="text-orange-400 font-mono text-2xl">BTC</p>
                    <p class="text-zinc-500 text-sm">Bitcoin</p>
                    <div class="price mt-6">$${btcPrice.toLocaleString('en-US')}</div>
                </div>

                <div class="card bg-zinc-900 rounded-3xl p-8 border border-zinc-800 tooltip">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-orange-400 font-mono text-2xl">MSTR</p>
                            <p class="text-zinc-500 text-sm">Strategy Inc</p>
                        </div>
                        <span class="${mstr.change >= 0 ? 'text-emerald-400' : 'text-red-400'} text-sm font-medium">
                            ${mstr.change >= 0 ? '↑' : '↓'} ${Math.abs(mstr.change).toFixed(2)}%
                        </span>
                    </div>
                    <div class="price mt-6">$${mstr.price.toFixed(2)}</div>
                    <span class="tooltiptext">Volume: ${mstr.volume.toLocaleString()}</span>
                </div>

                <div class="card bg-zinc-900 rounded-3xl p-8 border border-zinc-800 tooltip">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-orange-400 font-mono text-2xl">ASST</p>
                            <p class="text-zinc-500 text-sm">Strive Inc.</p>
                        </div>
                        <span class="${asst.change >= 0 ? 'text-emerald-400' : 'text-red-400'} text-sm font-medium">
                            ${asst.change >= 0 ? '↑' : '↓'} ${Math.abs(asst.change).toFixed(2)}%
                        </span>
                    </div>
                    <div class="price mt-6">$${asst.price.toFixed(2)}</div>
                    <span class="tooltiptext">Volume: ${asst.volume.toLocaleString()}</span>
                </div>

                <div class="card bg-zinc-900 rounded-3xl p-8 border border-zinc-800 tooltip">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-orange-400 font-mono text-2xl">STRC</p>
                            <p class="text-zinc-500 text-sm">Strategy Preferred</p>
                        </div>
                        <span class="${strc.change >= 0 ? 'text-emerald-400' : 'text-red-400'} text-sm font-medium">
                            ${strc.change >= 0 ? '↑' : '↓'} ${Math.abs(strc.change).toFixed(2)}%
                        </span>
                    </div>
                    <div class="price mt-6">$${strc.price.toFixed(2)}</div>
                    <span class="tooltiptext">Volume: ${strc.volume.toLocaleString()}</span>
                </div>
            `;
            document.getElementById('price-grid').innerHTML = priceHTML;

            // === Ratios + New STRC BTC Widget ===
            const btcMstr = Math.round(btcPrice / mstr.price);
            const btcAsst = Math.round(btcPrice / asst.price);
            const mstrAsst = (mstr.price / asst.price).toFixed(1);

            // STRC BTC = (STRC Volume × 100 × 0.55) / BTC Price
            const strcBtc = strc.volume > 0 
                ? ((strc.volume * 100 * 0.55) / btcPrice).toFixed(2)
                : "—";

            const widgetHTML = `
                <div class="card bg-zinc-900 rounded-3xl p-8 text-center border border-zinc-800">
                    <p class="text-orange-400 font-medium">BTC / MSTR</p>
                    <div class="ratio mt-6">${btcMstr}</div>
                </div>
                <div class="card bg-zinc-900 rounded-3xl p-8 text-center border border-zinc-800">
                    <p class="text-orange-400 font-medium">BTC / ASST</p>
                    <div class="ratio mt-6">${btcAsst}</div>
                </div>
                <div class="card bg-zinc-900 rounded-3xl p-8 text-center border border-zinc-800">
                    <p class="text-orange-400 font-medium">MSTR / ASST</p>
                    <div class="ratio mt-6">${mstrAsst}</div>
                </div>
                <div class="card bg-zinc-900 rounded-3xl p-8 text-center border border-zinc-800">
                    <p class="text-orange-400 font-medium">STRC BTC</p>
                    <div class="ratio mt-6">${strcBtc}</div>
                    <p class="text-xs text-zinc-500 mt-2">(STRC Vol × 55) / BTC</p>
                </div>
            `;
            document.getElementById('ratio-grid').innerHTML = widgetHTML;

            // Timestamp
            const displayTime = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('timestamp').innerHTML = `Last updated: <span class="font-mono">${displayTime}</span>`;
        }

        function refreshNow() {
            fetchAllPrices();
        }

        window.onload = () => {
            fetchAllPrices();
            setInterval(fetchAllPrices, 300000);   // every 5 minutes
        };
    </script>
</body>
</html>
