<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Treasury Live • 5-Min Updates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); }
        .price { font-size: 2.85rem; line-height: 1; font-weight: 700; letter-spacing: -2px; }
        .ratio { font-size: 2.45rem; font-weight: 700; letter-spacing: -1px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-7xl mx-auto px-6 py-10">

        <div class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-5xl font-bold tracking-tighter">BTC TREASURY LIVE</h1>
                <p class="text-orange-400 text-xl mt-1">BTC • MSTR • ASST (Strive) • MTPLF • Smart updates (Alpha Vantage free tier)</p>
            </div>
            <div class="text-right">
                <div id="timestamp" class="text-zinc-400 text-sm font-medium">Last updated: —</div>
                <button onclick="refreshNow()" 
                        class="mt-4 flex items-center gap-2 bg-orange-400 hover:bg-orange-300 text-black px-7 py-3.5 rounded-2xl font-semibold text-sm transition-all">
                    <i class="fas fa-sync-alt"></i> REFRESH NOW
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-16" id="price-grid"></div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="ratio-grid"></div>

        <div class="text-center text-zinc-500 text-xs mt-20">
            Alpha Vantage optimized: MTPLF once/day • MSTR/ASST ~12x during market hours only • BTC every 5 min
        </div>
    </div>

    <script>
        const AV_KEY = "OVCAM1MS1D0KR27Q";

        // Persistent storage (last known good data)
        let lastData = {
            btcPrice: 84000,
            mstr: { price: 129.76, change: 0, volume: 0 },
            asst: { price: 10.42, change: 0, volume: 0 },
            mtplf: { price: 2.01, change: 0, volume: 0 }
        };

        let mtplfFetchedToday = false;
        let lastMarketFetch = null;

        function isMarketOpen() {
            const now = new Date();
            const day = now.getDay(); // 0=Sun, 6=Sat
            if (day === 0 || day === 6) return false; // Weekend

            const hour = now.getUTCHours();
            const minute = now.getUTCMinutes();
            const etHour = (hour - 4 + 24) % 24; // Rough ET conversion (ignores DST but good enough)

            // 9:30 AM - 4:00 PM ET
            return (etHour > 9 || (etHour === 9 && minute >= 30)) && (etHour < 16);
        }

        async function fetchAlphaQuote(symbol) {
            try {
                const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${AV_KEY}`;
                const res = await fetch(url);
                const data = await res.json();
                const quote = data['Global Quote'] || {};

                return {
                    price: parseFloat(quote['05. price']) || null,
                    change: parseFloat(quote['10. change percent']) || 0,
                    volume: parseFloat(quote['06. volume']) || 0
                };
            } catch (e) {
                return null;
            }
        }

        async function fetchAllPrices() {
            let btcPrice = lastData.btcPrice;

            // Always update BTC every 5 min
            try {
                const cgRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const cgData = await cgRes.json();
                btcPrice = parseFloat(cgData.bitcoin.usd) || btcPrice;
            } catch (e) {}

            const now = new Date();
            const isMarket = isMarketOpen();

            // MSTR & ASST - up to ~12 times/day during market hours
            let mstr = lastData.mstr;
            let asst = lastData.asst;

            if (isMarket && (!lastMarketFetch || (now - lastMarketFetch) > 300000)) {  // at least 5 min since last market fetch
                const mstrData = await fetchAlphaQuote('MSTR');
                if (mstrData && mstrData.price) mstr = mstrData;

                const asstData = await fetchAlphaQuote('ASST');
                if (asstData && asstData.price) asst = asstData;

                lastMarketFetch = now;
            }

            // MTPLF - only once per day
            let mtplf = lastData.mtplf;
            if (!mtplfFetchedToday) {
                const mtplfData = await fetchAlphaQuote('MTPLF');
                if (mtplfData && mtplfData.price) {
                    mtplf = mtplfData;
                    mtplfFetchedToday = true;
                }
            }

            // Save latest values
            lastData = { btcPrice, mstr, asst, mtplf };

            // Render Prices
            const priceHTML = `
                <div class="card bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
                    <p class="text-orange-400 font-mono text-2xl">BTC</p>
                    <p class="text-zinc-500 text-sm">Bitcoin</p>
                    <div class="price mt-6">$${btcPrice.toLocaleString('en-US')}</div>
                </div>

                <div class="card bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-orange-400 font-mono text-2xl">MSTR</p>
                            <p class="text-zinc-500 text-sm">Strategy • Vol: ${mstr.volume.toLocaleString()}</p>
                        </div>
                        <span class="${mstr.change >= 0 ? 'text-emerald-400' : 'text-red-400'} text-sm font-medium">
                            ${mstr.change >= 0 ? '↑' : '↓'} ${Math.abs(mstr.change).toFixed(2)}%
                        </span>
                    </div>
                    <div class="price mt-6">$${mstr.price.toFixed(2)}</div>
                </div>

                <div class="card bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-orange-400 font-mono text-2xl">ASST</p>
                            <p class="text-zinc-500 text-sm">Strive Inc. • Vol: ${asst.volume.toLocaleString()}</p>
                        </div>
                        <span class="${asst.change >= 0 ? 'text-emerald-400' : 'text-red-400'} text-sm font-medium">
                            ${asst.change >= 0 ? '↑' : '↓'} ${Math.abs(asst.change).toFixed(2)}%
                        </span>
                    </div>
                    <div class="price mt-6">$${asst.price.toFixed(2)}</div>
                </div>

                <div class="card bg-zinc-900 rounded-3xl p-8 border border-zinc-800">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-orange-400 font-mono text-2xl">MTPLF</p>
                            <p class="text-zinc-500 text-sm">Metaplanet • Vol: ${mtplf.volume.toLocaleString()}</p>
                        </div>
                        <span class="${mtplf.change >= 0 ? 'text-emerald-400' : 'text-red-400'} text-sm font-medium">
                            ${mtplf.change >= 0 ? '↑' : '↓'} ${Math.abs(mtplf.change).toFixed(2)}%
                        </span>
                    </div>
                    <div class="price mt-6">$${mtplf.price.toFixed(2)}</div>
                </div>
            `;
            document.getElementById('price-grid').innerHTML = priceHTML;

            // Ratios
            const btcMstr = Math.round(btcPrice / mstr.price);
            const btcAsst = Math.round(btcPrice / asst.price);
            const mstrAsst = (mstr.price / asst.price).toFixed(1);

            const ratioHTML = `
                <div class="card bg-zinc-900 rounded-3xl p-8 text-center border border-zinc-800">
                    <p class="text-orange-400 font-medium">BTC / MSTR</p>
                    <div class="ratio mt-6">${btcMstr}</div>
                </div>
                <div class="card bg-zinc-900 rounded-3xl p-8 text-center border border-zinc-800">
                    <p class="text-orange-400 font-medium">BTC / ASST</p>
                    <div class="ratio mt-6">${btcAsst}</div>
                </div>
                <div class="card bg-zinc-900 rounded-3xl p-8 text-center border border-zinc-800">
                    <p class="text-orange-400 font-medium">MSTR / ASST</p>
                    <div class="ratio mt-6">${mstrAsst}</div>
                </div>
            `;
            document.getElementById('ratio-grid').innerHTML = ratioHTML;

            const displayTime = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            document.getElementById('timestamp').innerHTML = `Last updated: <span class="font-mono">${displayTime}</span>`;
        }

        function refreshNow() {
            fetchAllPrices();
        }

        // Initial load + every 5 minutes
        window.onload = () => {
            fetchAllPrices();
            setInterval(fetchAllPrices, 300000);
        };
    </script>
</body>
</html>
